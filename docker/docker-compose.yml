version: '3.9'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: second-brain-backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../data/uploads:/app/uploads
      - ../data:/app/data

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: second-brain-frontend
    env_file:
      - ../.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
