services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: minddock-backend
    env_file:
      - ../.env
    expose:
      - "8000"
    volumes:
      - ../backend:/app
      - ../data:/app/data
      - ../data/uploads:/app/uploads
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: minddock-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
